---
- name: Build and push image to ACR
  hosts: localhost
  gather_facts: false
  vars_files:
    - secrets.yml
  roles:
    - acr

- name: Install Podman and deploy web app on VM
  hosts: webapp
  become: true
  vars_files:
    - secrets.yml
  roles:
    - vm

- name: Deploy application on AKS
  hosts: localhost
  gather_facts: false
  vars_files:
    - secrets.yml
  roles:
    - aks